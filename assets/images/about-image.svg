<svg width="400" height="500" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="500" fill="url(#bgGradient)"/>
  
  <!-- Person Silhouette -->
  <g transform="translate(200, 250)">
    <!-- Head -->
    <circle cx="0" cy="-80" r="40" fill="#1f2937"/>
    
    <!-- Body -->
    <rect x="-30" y="-40" width="60" height="100" rx="15" fill="#374151"/>
    
    <!-- Arms -->
    <rect x="-45" y="-30" width="15" height="70" rx="7" fill="#4b5563"/>
    <rect x="30" y="-30" width="15" height="70" rx="7" fill="#4b5563"/>
    
    <!-- Legs -->
    <rect x="-20" y="60" width="15" height="80" rx="7" fill="#1f2937"/>
    <rect x="5" y="60" width="15" height="80" rx="7" fill="#1f2937"/>
  </g>
  
  <!-- Tech Stack Icons Around -->
  <g opacity="0.8">
    <!-- HTML5 -->
    <g transform="translate(80, 100)">
      <polygon points="0,0 20,0 18,20 10,22 2,20" fill="#e34f26"/>
      <text x="10" y="15" text-anchor="middle" font-size="8" fill="white" font-weight="bold">5</text>
    </g>
    
    <!-- CSS3 -->
    <g transform="translate(320, 120)">
      <polygon points="0,0 20,0 18,20 10,22 2,20" fill="#1572b6"/>
      <text x="10" y="15" text-anchor="middle" font-size="8" fill="white" font-weight="bold">3</text>
    </g>
    
    <!-- Python -->
    <g transform="translate(70, 380)">
      <circle cx="10" cy="10" r="15" fill="#3776ab"/>
      <text x="10" y="15" text-anchor="middle" font-size="8" fill="white" font-weight="bold">PY</text>
    </g>
    
    <!-- Node.js -->
    <g transform="translate(330, 380)">
      <circle cx="10" cy="10" r="15" fill="#68a063"/>
      <path d="M5 6L10 3L15 6V14L10 17L5 14Z" fill="#ffffff"/>
    </g>
    
    <!-- Database -->
    <g transform="translate(50, 200)">
      <ellipse cx="15" cy="5" rx="15" ry="5" fill="#336791"/>
      <rect x="0" y="5" width="30" height="15" fill="#336791"/>
      <ellipse cx="15" cy="20" rx="15" ry="5" fill="#336791"/>
      <ellipse cx="15" cy="12" rx="15" ry="5" fill="#4a90c2"/>
    </g>
    
    <!-- Git -->
    <g transform="translate(320, 200)">
      <circle cx="15" cy="15" r="15" fill="#f05032"/>
      <path d="M10 10L20 10L15 15Z" fill="white"/>
      <path d="M10 20L20 20L15 15Z" fill="white"/>
    </g>
  </g>
  
  <!-- Code Pattern -->
  <g opacity="0.1">
    <text x="50" y="50" font-family="monospace" font-size="10" fill="#004687">const developer = {</text>
    <text x="60" y="70" font-family="monospace" font-size="10" fill="#A50044">  name: "Miguel Bolivar",</text>
    <text x="60" y="90" font-family="monospace" font-size="10" fill="#CC2233">  skills: ["Backend", "Python"],</text>
    <text x="60" y="110" font-family="monospace" font-size="10" fill="#004687">  passion: "coding"</text>
    <text x="50" y="130" font-family="monospace" font-size="10" fill="#004687">};</text>
  </g>
  
  <!-- Decorative Elements -->
  <g opacity="0.3">
    <!-- Floating Circles -->
    <circle cx="80" cy="300" r="3" fill="#004687"/>
    <circle cx="350" cy="100" r="4" fill="#A50044"/>
    <circle cx="100" cy="450" r="2" fill="#CC2233"/>
    <circle cx="320" cy="300" r="3" fill="#004687"/>
    
    <!-- Lines -->
    <line x1="50" y1="250" x2="100" y2="280" stroke="#004687" stroke-width="1"/>
    <line x1="300" y1="150" x2="350" y2="180" stroke="#A50044" stroke-width="1"/>
    <line x1="80" y1="420" x2="130" y2="450" stroke="#CC2233" stroke-width="1"/>
  </g>
  
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>
</svg>