<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="url(#backgroundGradient)" stroke="url(#borderGradient)" stroke-width="4"/>
  
  <!-- Tech Icons Background -->
  <g opacity="0.1">
    <!-- Code brackets -->
    <path d="M80 120L60 140L80 160M320 120L340 140L320 160" stroke="#004687" stroke-width="3" stroke-linecap="round"/>
    <!-- Gear -->
    <circle cx="320" cy="280" r="15" fill="none" stroke="#A50044" stroke-width="2"/>
    <circle cx="320" cy="280" r="8" fill="none" stroke="#A50044" stroke-width="2"/>
    <!-- Binary -->
    <text x="70" y="300" font-family="monospace" font-size="12" fill="#CC2233">01010</text>
  </g>
  
  <!-- Character -->
  <g>
    <!-- Head -->
    <circle cx="200" cy="150" r="45" fill="#fbbf24"/>
    
    <!-- Hair -->
    <path d="M155 130C155 100 175 80 200 80C225 80 245 100 245 130C245 125 240 120 235 120C230 115 220 115 215 120C210 115 200 115 195 120C190 115 180 115 175 120C170 115 160 120 155 130Z" fill="#92400e"/>
    
    <!-- Eyes -->
    <circle cx="185" cy="145" r="3" fill="#1f2937"/>
    <circle cx="215" cy="145" r="3" fill="#1f2937"/>
    <circle cx="186" cy="144" r="1" fill="#ffffff"/>
    <circle cx="216" cy="144" r="1" fill="#ffffff"/>
    
    <!-- Nose -->
    <ellipse cx="200" cy="155" rx="2" ry="3" fill="#f59e0b"/>
    
    <!-- Mouth -->
    <path d="M190 165C195 170 205 170 210 165" stroke="#1f2937" stroke-width="2" stroke-linecap="round" fill="none"/>
    
    <!-- Body -->
    <rect x="170" y="195" width="60" height="80" rx="10" fill="url(#shirtGradient)"/>
    
    <!-- Laptop -->
    <rect x="150" y="240" width="100" height="60" rx="5" fill="#374151"/>
    <rect x="155" y="245" width="90" height="50" rx="3" fill="#111827"/>
    <rect x="160" y="250" width="80" height="40" rx="2" fill="#0ea5e9"/>
    
    <!-- Code on laptop screen -->
    <g>
      <line x1="165" y1="255" x2="185" y2="255" stroke="#10b981" stroke-width="1"/>
      <line x1="165" y1="260" x2="175" y2="260" stroke="#f59e0b" stroke-width="1"/>
      <line x1="180" y1="260" x2="195" y2="260" stroke="#ef4444" stroke-width="1"/>
      <line x1="165" y1="265" x2="190" y2="265" stroke="#8b5cf6" stroke-width="1"/>
      <line x1="165" y1="270" x2="180" y2="270" stroke="#06b6d4" stroke-width="1"/>
      <line x1="165" y1="275" x2="200" y2="275" stroke="#10b981" stroke-width="1"/>
      <line x1="165" y1="280" x2="185" y2="280" stroke="#f59e0b" stroke-width="1"/>
    </g>
    
    <!-- Arms -->
    <ellipse cx="160" cy="220" rx="12" ry="25" fill="#fbbf24"/>
    <ellipse cx="240" cy="220" rx="12" ry="25" fill="#fbbf24"/>
    
    <!-- Hands -->
    <circle cx="155" cy="245" r="8" fill="#fbbf24"/>
    <circle cx="245" cy="245" r="8" fill="#fbbf24"/>
  </g>
  
  <!-- Floating Elements -->
  <g>
    <!-- React Icon -->
    <g transform="translate(300, 100)">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#61dafb" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#61dafb" stroke-width="2"/>
      <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#61dafb" stroke-width="2" transform="rotate(60)"/>
      <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="#61dafb" stroke-width="2" transform="rotate(-60)"/>
      <circle cx="0" cy="0" r="3" fill="#61dafb"/>
    </g>
    
    <!-- JavaScript Icon -->
    <g transform="translate(100, 100)">
      <rect x="-10" y="-10" width="20" height="20" rx="3" fill="#f7df1e"/>
      <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000">JS</text>
    </g>
    
    <!-- Node.js Icon -->
    <g transform="translate(320, 320)">
      <circle cx="0" cy="0" r="12" fill="#68a063"/>
      <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">N</text>
    </g>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004687;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#A50044;stop-opacity:0.1"/>
    </linearGradient>
    
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004687;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#A50044;stop-opacity:0.5"/>
    </linearGradient>
    
    <linearGradient id="shirtGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004687"/>
      <stop offset="100%" style="stop-color:#A50044"/>
    </linearGradient>
  </defs>
</svg>