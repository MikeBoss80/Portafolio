<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal — Portafolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="terminal.css">
</head>
<body>

<p class="titulo-seccion">// habilidades — modo interactivo</p>

<div class="terminal" id="terminal">
  <div class="term-barra">
    <span class="punto r"></span><span class="punto a"></span><span class="punto v"></span>
    <span class="ruta" id="rutaBarra">visitante@portafolio: ~</span>
  </div>
  <div class="term-cuerpo" id="cuerpo" aria-live="polite"></div>
</div>

<div class="sugerencias" id="sugerencias">
  <p class="hint">Haz click en un comando o escribe el tuyo</p>
</div>

<script src="terminal.js"></script>
</body>
</html>
